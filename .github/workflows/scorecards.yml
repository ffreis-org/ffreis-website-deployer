name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: "58 21 24 * *"  # monthly scattered (was: 20 7 * * 2)
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scorecard:
    permissions:
      contents: read
      actions: read
      security-events: write
      id-token: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-scorecard-publish.yml@610fd288c303c9dfe06ea7fa153f5d0178224342 # v1.3.2
    with:
      upload-sarif: true

