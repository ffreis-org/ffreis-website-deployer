name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: "58 21 24 * *"  # monthly scattered (was: 20 7 * * 2)
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scorecard:
    permissions:
      contents: read
      actions: read
      security-events: write
      id-token: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-scorecard.yml@01e2b12e992621fecf074b8a202f66044196f3bf
    with:
      upload-sarif: true
      publish-results: true

