name: DevOps / Labeler

permissions: {}

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  labeler:
    permissions:
      contents: read
      pull-requests: write
      issues: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-labeler.yml@caa797cc7baec52e99f21b86f532a4b7c88cf4fa # fix/grype-install-outside-scan-path
    with:
      rules-json: |-
        [
          {"label": "ci", "patterns": [".github/workflows/**", ".github/actions/**"]},
          {"label": "docs", "patterns": ["**/*.md"]}
        ]

