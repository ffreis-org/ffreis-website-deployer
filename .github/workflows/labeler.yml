name: DevOps / Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  labeler:
    permissions:
      contents: read
      pull-requests: write
      issues: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-labeler.yml@0aa2f6932831848d438834938acefcd98bc05c42 # post-v1.6.0
    with:
      rules-json: |-
        [
          {"label": "ci", "patterns": [".github/workflows/**", ".github/actions/**"]},
          {"label": "docs", "patterns": ["**/*.md"]}
        ]

