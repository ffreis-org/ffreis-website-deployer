name: DevOps / Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  labeler:
    permissions:
      contents: read
      pull-requests: write
      issues: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-labeler.yml@01e2b12e992621fecf074b8a202f66044196f3bf
    with:
      rules-json: |-
        [
          {"label": "ci", "patterns": [".github/workflows/**", ".github/actions/**"]},
          {"label": "docs", "patterns": ["**/*.md"]}
        ]

