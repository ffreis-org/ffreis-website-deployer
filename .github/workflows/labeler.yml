name: DevOps / Labeler

permissions: {}

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  labeler:
    permissions:
      contents: read
      pull-requests: write
      issues: write
    uses: ffreis-org/ffreis-workflows-general/.github/workflows/general-labeler.yml@3858e9e74c805067e454740b195372c7195f333b # v1.5.0
    with:
      rules-json: |-
        [
          {"label": "ci", "patterns": [".github/workflows/**", ".github/actions/**"]},
          {"label": "docs", "patterns": ["**/*.md"]}
        ]

