name: DevOps / Stale

on:
  schedule:
    - cron: "10 14 15 * *"  # monthly scattered (was: 0 6 * * 1)
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stale:
    permissions:
      issues: write
      pull-requests: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-stale.yml@0aa2f6932831848d438834938acefcd98bc05c42 # post-v1.6.0
    with:
      only: "both"
