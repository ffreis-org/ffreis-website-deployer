name: Deploy

on:
  repository_dispatch:
    types: [website-deploy-request]
  workflow_dispatch:
    inputs:
      website_name:
        description: 'Website name (must match a file in websites-inventory/)'
        required: true
      deployment_name:
        description: 'Deployment to run (empty = all deployments)'
        required: false
        default: ''
      website_sha:
        description: 'Website repo SHA (leave empty for HEAD of main)'
        required: false
        default: ''
      data_sha:
        description: 'Data repo SHA (leave empty for HEAD of main)'
        required: false
        default: ''

# Never cancel a running deploy mid-flight. Queue the next one instead.
concurrency:
  group: deploy-${{ inputs.website_name || github.event.client_payload.website_name }}-${{ inputs.deployment_name || github.event.client_payload.deployment_name || 'all' }}
  cancel-in-progress: false

jobs:
  # ── config ────────────────────────────────────────────────────────────────
  # Reads <website_name>.yaml from websites-inventory and resolves the list of
  # deployments to build. Downstream jobs fan out over deployments_json as a matrix.
  config:
    timeout-minutes: 30
    name: Resolve Config
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
    outputs:
      website_name:     ${{ steps.name.outputs.website_name }}
      should_deploy:    ${{ steps.parse.outputs.should_deploy }}
      deployments_json: ${{ steps.parse.outputs.deployments_json }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Resolve website name
        id: name
        run: |
          NAME="${{ inputs.website_name || github.event.client_payload.website_name }}"
          if [[ -z "$NAME" ]]; then
            echo "website_name is required (pass as input or client_payload.website_name)" >&2
            exit 1
          fi
          echo "website_name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Checkout websites-inventory
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ vars.INVENTORY_REPO || format('{0}/websites-inventory', github.repository_owner) }}
          token: ${{ secrets.CI_REPO_READ_TOKEN }}

      - name: Parse inventory and resolve deployments
        id: parse
        env:
          WEBSITE_NAME:      ${{ steps.name.outputs.website_name }}
          DEPLOYMENT_NAME:   ${{ inputs.deployment_name || github.event.client_payload.deployment_name || '' }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          python3 - <<'PYEOF'
          import yaml, os, sys, json, glob

          name              = os.environ["WEBSITE_NAME"]
          deployment_filter = os.environ.get("DEPLOYMENT_NAME", "").strip()
          event             = os.environ["GITHUB_EVENT_NAME"]

          matches = glob.glob(f"**/{name}.yaml", recursive=True)
          if not matches:
              print(f"Inventory file not found: {name}.yaml (searched recursively)", file=sys.stderr)
              sys.exit(1)
          path = matches[0]
          with open(path) as f:
              cfg = yaml.safe_load(f)

          top_sources   = cfg.get("sources", {})
          top_website   = top_sources.get("website", {})
          top_data      = top_sources.get("data",    {})
          top_posts     = top_sources.get("posts",   {})
          top_projects  = top_sources.get("projects", {})
          top_courses   = top_sources.get("courses",  {})
          top_compiler  = cfg.get("compiler", {})
          top_builds    = cfg.get("builds",  {})
          top_publish   = cfg.get("publish", {})
          top_mode      = cfg.get("deploy_mode", "manual")
          top_env       = cfg.get("github_environment", "prod")
          top_cf        = top_publish.get("cloudfront_invalidate_paths", ["/*"])
          top_recaptcha = cfg.get("recaptcha_site_key", "")

          raw_deployments = cfg.get("deployments", None)
          legacy = raw_deployments is None

          def resolve(dep_name, dep_cfg):
              d_src = dep_cfg.get("sources", {})
              d_web = d_src.get("website", {})
              d_dat = d_src.get("data",    {})
              d_pos = d_src.get("posts",   {})
              d_prj = d_src.get("projects", {})
              d_crs = d_src.get("courses",  {})
              d_pub = dep_cfg.get("publish", {})
              d_cf  = d_pub.get("cloudfront_invalidate_paths", top_cf)
              return {
                  "name":             dep_name,
                  "deploy_mode":      dep_cfg.get("deploy_mode", top_mode),
                  "website_repo":     top_website.get("repo", ""),
                  "website_ref":      d_web.get("ref", top_website.get("ref", "main")),
                  "data_repo":        top_data.get("repo", ""),
                  "data_ref":         d_dat.get("ref", top_data.get("ref", "main")),
                  "data_subpath":     d_dat.get("subpath", top_data.get("subpath", "")),
                  "posts_repo":       d_pos.get("repo", top_posts.get("repo", "")),
                  "posts_ref":        d_pos.get("ref",  top_posts.get("ref",  "main")),
                  "projects_repo":    d_prj.get("repo", top_projects.get("repo", "")),
                  "projects_ref":     d_prj.get("ref",  top_projects.get("ref",  "main")),
                  "courses_repo":     d_crs.get("repo", top_courses.get("repo", "")),
                  "courses_ref":      d_crs.get("ref",  top_courses.get("ref",  "main")),
                  "compiler_repo":    top_compiler.get("repo", ""),
                  "compiler_ref":     top_compiler.get("ref", "main"),
                  "compiler_js_inline_threshold":        str(top_compiler["js_inline_threshold"]) if "js_inline_threshold" in top_compiler else "",
                  "compiler_js_shared_inline_threshold": str(top_compiler["js_shared_inline_threshold"]) if "js_shared_inline_threshold" in top_compiler else "",
                  "compiler_raster_inline_threshold":    str(top_compiler["raster_inline_threshold"]) if "raster_inline_threshold" in top_compiler else "",
                  "compiler_embed_fonts":                "true" if top_compiler.get("embed_fonts", False) else "",
                  "compiler_inline_body_css":            "true" if top_compiler.get("inline_body_css", False) else "",
                  "builds_bucket":    top_builds.get("bucket", ""),
                  "builds_region":    top_builds.get("region", "us-east-1"),
                  "publish_bucket":   d_pub.get("bucket", top_publish.get("bucket", "")),
                  "publish_prefix":   d_pub.get("prefix", ""),
                  "publish_region":   d_pub.get("region", top_publish.get("region", top_builds.get("region", "us-east-1"))),
                  "cloudfront_paths": " ".join(d_cf),
                  "github_env":       dep_cfg.get("github_environment", top_env),
                  "staging_prefix":   f"{name}/{dep_name}" if not legacy else name,
                  "smoke_paths":      " ".join(dep_cfg.get("smoke_paths", top_publish.get("smoke_paths", ["/"]))),
                  # IP-restricted sites (WAF-allowlist on prod, not just dev) need to skip
                  # smoke since GH runner IPs aren't in the allowlist. Set in inventory at
                  # publish.skip_smoke: true (or per-deployment override).
                  "skip_smoke":       "true" if dep_cfg.get("skip_smoke", top_publish.get("skip_smoke", False)) else "",
              }

          if not legacy:
              all_deps = [resolve(k, v) for k, v in raw_deployments.items()]
          else:
              all_deps = [resolve("production", {})]

          # Compute sibling_prefixes for each deployment: the non-empty prefixes
          # of all other deployments sharing the same publish bucket. Used by the
          # promote step to add --exclude patterns so a root-prefix deploy (PT)
          # does not delete sub-prefix content (EN, dev, etc.).
          all_buckets_prefixes = [(d["publish_bucket"], d["publish_prefix"]) for d in all_deps]
          for d in all_deps:
              siblings = [
                  p for (b, p) in all_buckets_prefixes
                  if b == d["publish_bucket"] and p and p != d["publish_prefix"]
              ]
              d["sibling_prefixes"] = " ".join(siblings)

          if deployment_filter:
              selected = [d for d in all_deps if d["name"] == deployment_filter]
              if not selected:
                  avail = [d["name"] for d in all_deps]
                  print(f"deployment '{deployment_filter}' not found in {path}; available: {avail}", file=sys.stderr)
                  sys.exit(1)
          elif event == "workflow_dispatch":
              selected = all_deps
          else:
              selected = [d for d in all_deps if d["deploy_mode"] == "auto"]

          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a") as f:
              delim = "DEPLOYMENTS_JSON_EOF"
              f.write(f"should_deploy={'true' if selected else 'false'}\n")
              f.write(f"deployments_json<<{delim}\n")
              f.write(json.dumps(selected))
              f.write(f"\n{delim}\n")
          PYEOF

  # ── validate ──────────────────────────────────────────────────────────────
  validate:
    timeout-minutes: 30
    name: Validate Data (${{ matrix.deployment.name }})
    needs: config
    if: needs.config.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        deployment: ${{ fromJson(needs.config.outputs.deployments_json) }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout data repo
        if: matrix.deployment.data_repo != ''
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ matrix.deployment.data_repo }}
          ref: ${{ github.event.client_payload.data_sha || inputs.data_sha || matrix.deployment.data_ref }}
          path: checkout/data
          token: ${{ secrets.CI_REPO_READ_TOKEN }}

      - name: Checkout website repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ matrix.deployment.website_repo }}
          ref: ${{ inputs.website_sha || matrix.deployment.website_ref }}
          path: checkout/website
          token: ${{ secrets.CI_REPO_READ_TOKEN }}

      - name: Checkout compiler
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ matrix.deployment.compiler_repo }}
          ref: ${{ matrix.deployment.compiler_ref }}
          path: checkout/compiler
          token: ${{ secrets.CI_REPO_READ_TOKEN }}

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: checkout/compiler/go.mod
          cache: true

      - name: Detect compiler layout
        id: compiler
        shell: bash
        run: |
          set -euo pipefail
          for root in checkout/compiler checkout/compiler/*/; do
            if [[ -f "${root}/go.mod" && -f "${root}/cmd/website-compiler/main.go" ]]; then
              echo "dir=${root}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "Could not detect compiler layout under checkout/compiler" >&2; exit 1

      - name: Inject data into website
        if: matrix.deployment.data_repo != ''
        run: |
          set -euo pipefail
          SUBPATH="${{ matrix.deployment.data_subpath }}"
          DATA_ROOT="checkout/data${SUBPATH:+/${SUBPATH%/}}"
          # shared/ lives alongside the language dirs; derive its parent from DATA_ROOT.
          # Works whether subpath is "en/" (root layout) or "data/en/" (nested layout).
          if [[ -n "$SUBPATH" ]]; then
            DATA_PARENT="$(dirname "${DATA_ROOT}")"
          else
            DATA_PARENT="checkout/data"
          fi
          mkdir -p checkout/website/src/data/site.d
          if [ -d "${DATA_PARENT}/shared/site.d" ]; then
            cp -r "${DATA_PARENT}/shared/site.d/." checkout/website/src/data/site.d/
          fi
          cp -r "${DATA_ROOT}/site.d/." checkout/website/src/data/site.d/
          cp "${DATA_ROOT}/site.yaml"   checkout/website/src/data/

      - name: Validate site data against contract
        run: |
          set -euo pipefail
          go -C "${{ steps.compiler.outputs.dir }}" run ./cmd/website-compiler \
            validate-site-data \
            -website-root "$GITHUB_WORKSPACE/checkout/website"

  # ── build ─────────────────────────────────────────────────────────────────
  build:
    timeout-minutes: 30
    name: Build & Upload Artifact (${{ matrix.deployment.name }})
    needs: [config, validate]
    if: needs.config.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: ${{ matrix.deployment.github_env }}
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        deployment: ${{ fromJson(needs.config.outputs.deployments_json) }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout data repo
        if: matrix.deployment.data_repo != ''
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ matrix.deployment.data_repo }}
          ref: ${{ github.event.client_payload.data_sha || inputs.data_sha || matrix.deployment.data_ref }}
          path: checkout/data
          token: ${{ secrets.CI_REPO_READ_TOKEN }}

      - name: Checkout website repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ matrix.deployment.website_repo }}
          ref: ${{ inputs.website_sha || matrix.deployment.website_ref }}
          path: checkout/website
          token: ${{ secrets.CI_REPO_READ_TOKEN }}

      - name: Checkout compiler
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ matrix.deployment.compiler_repo }}
          ref: ${{ matrix.deployment.compiler_ref }}
          path: checkout/compiler
          token: ${{ secrets.CI_REPO_READ_TOKEN }}

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: checkout/compiler/go.mod
          cache: true

      - name: Detect compiler layout
        id: compiler
        shell: bash
        run: |
          set -euo pipefail
          for root in checkout/compiler checkout/compiler/*/; do
            if [[ -f "${root}/go.mod" && -f "${root}/cmd/website-compiler/main.go" ]]; then
              echo "dir=${root}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "Could not detect compiler layout under checkout/compiler" >&2; exit 1

      - name: Inject data into website
        if: matrix.deployment.data_repo != ''
        run: |
          set -euo pipefail
          SUBPATH="${{ matrix.deployment.data_subpath }}"
          DATA_ROOT="checkout/data${SUBPATH:+/${SUBPATH%/}}"
          # shared/ lives alongside the language dirs; derive its parent from DATA_ROOT.
          # Works whether subpath is "en/" (root layout) or "data/en/" (nested layout).
          if [[ -n "$SUBPATH" ]]; then
            DATA_PARENT="$(dirname "${DATA_ROOT}")"
          else
            DATA_PARENT="checkout/data"
          fi
          mkdir -p checkout/website/src/data/site.d
          if [ -d "${DATA_PARENT}/shared/site.d" ]; then
            cp -r "${DATA_PARENT}/shared/site.d/." checkout/website/src/data/site.d/
          fi
          cp -r "${DATA_ROOT}/site.d/." checkout/website/src/data/site.d/
          cp "${DATA_ROOT}/site.yaml"   checkout/website/src/data/

      - name: Checkout posts repo
        if: matrix.deployment.posts_repo != ''
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ matrix.deployment.posts_repo }}
          ref: ${{ matrix.deployment.posts_ref }}
          path: checkout/posts
          token: ${{ secrets.CI_REPO_READ_TOKEN }}

      - name: Checkout projects repo
        if: matrix.deployment.projects_repo != ''
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ matrix.deployment.projects_repo }}
          ref: ${{ matrix.deployment.projects_ref }}
          path: checkout/projects
          token: ${{ secrets.CI_REPO_READ_TOKEN }}

      - name: Checkout courses repo
        if: matrix.deployment.courses_repo != ''
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ matrix.deployment.courses_repo }}
          ref: ${{ matrix.deployment.courses_ref }}
          path: checkout/courses
          token: ${{ secrets.CI_REPO_READ_TOKEN }}

      - name: Build static site
        run: |
          set -euo pipefail
          mkdir -p dist
          POSTS_ARGS=()
          if [[ -n "${{ matrix.deployment.posts_repo }}" && -d "$GITHUB_WORKSPACE/checkout/posts/posts" ]]; then
            POSTS_ARGS=("-posts-dir" "$GITHUB_WORKSPACE/checkout/posts/posts")
          fi
          PROJECTS_ARGS=()
          if [[ -n "${{ matrix.deployment.projects_repo }}" && -f "$GITHUB_WORKSPACE/checkout/projects/projects.yaml" ]]; then
            PROJECTS_ARGS=("-projects-file" "$GITHUB_WORKSPACE/checkout/projects/projects.yaml")
          fi
          COURSES_ARGS=()
          if [[ -n "${{ matrix.deployment.courses_repo }}" && -f "$GITHUB_WORKSPACE/checkout/courses/courses.yaml" ]]; then
            COURSES_ARGS=("-courses-file" "$GITHUB_WORKSPACE/checkout/courses/courses.yaml")
          fi
          SIBLING_ARGS=()
          SIBLING_PREFIXES="${{ matrix.deployment.sibling_prefixes }}"
          if [[ -n "$SIBLING_PREFIXES" ]]; then
            SIBLING_ARGS=("-sibling-base-paths" "${SIBLING_PREFIXES// /,}")
          fi
          JS_INLINE_ARGS=()
          if [[ -n "${{ matrix.deployment.compiler_js_inline_threshold }}" ]]; then
            JS_INLINE_ARGS=("-js-inline-threshold" "${{ matrix.deployment.compiler_js_inline_threshold }}")
          fi
          JS_SHARED_INLINE_ARGS=()
          if [[ -n "${{ matrix.deployment.compiler_js_shared_inline_threshold }}" ]]; then
            JS_SHARED_INLINE_ARGS=("-js-shared-inline-threshold" "${{ matrix.deployment.compiler_js_shared_inline_threshold }}")
          fi
          RASTER_INLINE_ARGS=()
          if [[ -n "${{ matrix.deployment.compiler_raster_inline_threshold }}" ]]; then
            RASTER_INLINE_ARGS=("-raster-inline-threshold" "${{ matrix.deployment.compiler_raster_inline_threshold }}")
          fi
          EMBED_FONTS_ARGS=()
          if [[ "${{ matrix.deployment.compiler_embed_fonts }}" == "true" ]]; then
            EMBED_FONTS_ARGS=("-embed-fonts")
          fi
          INLINE_BODY_CSS_ARGS=()
          if [[ "${{ matrix.deployment.compiler_inline_body_css }}" == "true" ]]; then
            INLINE_BODY_CSS_ARGS=("-inline-body-css")
          fi
          go -C "${{ steps.compiler.outputs.dir }}" run ./cmd/build-static \
            -website-root "$GITHUB_WORKSPACE/checkout/website" \
            -out "$GITHUB_WORKSPACE/dist" \
            -clean-urls \
            "${POSTS_ARGS[@]}" \
            "${PROJECTS_ARGS[@]}" \
            "${COURSES_ARGS[@]}" \
            "${SIBLING_ARGS[@]}" \
            "${JS_INLINE_ARGS[@]}" \
            "${JS_SHARED_INLINE_ARGS[@]}" \
            "${RASTER_INLINE_ARGS[@]}" \
            "${EMBED_FONTS_ARGS[@]}" \
            "${INLINE_BODY_CSS_ARGS[@]}"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ matrix.deployment.builds_region }}

      - name: Upload build artifact to staging bucket
        env:
          STAGING_PREFIX: ${{ matrix.deployment.staging_prefix }}
          BUILD_SHA:      ${{ github.event.client_payload.sha || github.sha }}
          BUILDS_BUCKET:  ${{ matrix.deployment.builds_bucket }}
          REGION:         ${{ matrix.deployment.builds_region }}
        run: |
          set -euo pipefail
          SHA7="${BUILD_SHA::7}"
          aws s3 sync dist/ "s3://${BUILDS_BUCKET}/${STAGING_PREFIX}/${SHA7}/" \
            --region "$REGION" --delete

  # ── promote ───────────────────────────────────────────────────────────────
  promote:
    timeout-minutes: 30
    name: Promote to Live (${{ matrix.deployment.name }})
    needs: [config, build]
    if: needs.config.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: ${{ matrix.deployment.github_env }}
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        deployment: ${{ fromJson(needs.config.outputs.deployments_json) }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ matrix.deployment.builds_region }}

      - name: Promote build to live bucket
        env:
          STAGING_PREFIX:   ${{ matrix.deployment.staging_prefix }}
          BUILD_SHA:        ${{ github.event.client_payload.sha || github.sha }}
          BUILDS_BUCKET:    ${{ matrix.deployment.builds_bucket }}
          LIVE_BUCKET:      ${{ secrets.S3_WEBSITE_BUCKET }}
          PUBLISH_PREFIX:   ${{ matrix.deployment.publish_prefix }}
          REGION:           ${{ matrix.deployment.builds_region }}
          SIBLING_PREFIXES: ${{ matrix.deployment.sibling_prefixes }}
        run: |
          set -euo pipefail
          SHA7="${BUILD_SHA::7}"
          SRC="s3://${BUILDS_BUCKET}/${STAGING_PREFIX}/${SHA7}/"
          if [[ -n "${PUBLISH_PREFIX}" ]]; then
            DEST="s3://${LIVE_BUCKET}/${PUBLISH_PREFIX%/}/"
          else
            DEST="s3://${LIVE_BUCKET}/"
          fi
          # When there are sibling deployments sharing the same bucket (e.g. PT
          # and EN on the same bucket, with PT at root and EN at en/), skip
          # --delete entirely for this deployment. aws s3 sync --delete with
          # --exclude does not reliably protect sibling prefixes in versioned
          # buckets, so we prefer to leave orphaned files rather than risk
          # wiping another language's content.
          if [[ -n "${SIBLING_PREFIXES:-}" ]]; then
            aws s3 sync "$SRC" "$DEST" --region "$REGION"
          else
            aws s3 sync "$SRC" "$DEST" --region "$REGION" --delete
          fi

      - name: Smoke test — verify live site is reachable
        env:
          CF_DISTRIBUTION_ID: ${{ secrets.CF_DISTRIBUTION_ID }}
          GITHUB_ENV_NAME:    ${{ matrix.deployment.github_env }}
          SMOKE_PATHS:        ${{ matrix.deployment.smoke_paths }}
          SKIP_SMOKE:         ${{ matrix.deployment.skip_smoke }}
        run: |
          set -euo pipefail
          # Dev environments have WAF IP allowlists that block GH Actions runners.
          # Additionally, CloudFront custom_error_response maps WAF-403 → 404, so
          # the actual status code is unpredictable for dev. Skip smoke tests for dev;
          # the successful Build & Upload Artifact job already validates OIDC auth and
          # S3 write permissions — which is the meaningful deployment check.
          if [[ "$GITHUB_ENV_NAME" == *"-dev" ]]; then
            echo "Skipping smoke test for dev environment (WAF IP allowlist active; CloudFront converts WAF-403 to 404)."
            exit 0
          fi
          # Inventory opt-in for IP-restricted prod sites (e.g. dashboard.ffreis.com).
          # The GH runner IP isn't in the WAF allowlist so smoke would always fail.
          # Build + S3 upload + CloudFront invalidation succeeding is the meaningful
          # check for these sites. Set publish.skip_smoke: true in inventory yaml.
          if [[ "$SKIP_SMOKE" == "true" ]]; then
            echo "Skipping smoke test (inventory publish.skip_smoke=true; IP-restricted prod site)."
            exit 0
          fi
          # Resolve primary domain: first non-www alias, or the CloudFront *.cloudfront.net domain.
          ALIASES=$(aws cloudfront get-distribution \
            --id "$CF_DISTRIBUTION_ID" \
            --query 'Distribution.DistributionConfig.Aliases.Items' \
            --output json 2>/dev/null || echo "null")
          if [[ "$ALIASES" == "null" || "$ALIASES" == "[]" ]]; then
            DOMAIN=$(aws cloudfront get-distribution \
              --id "$CF_DISTRIBUTION_ID" \
              --query 'Distribution.DomainName' --output text)
          else
            DOMAIN=$(ALIASES_JSON="$ALIASES" python3 -c "
          import json, os
          aliases = json.loads(os.environ['ALIASES_JSON'])
          print(next((a for a in aliases if not a.startswith('www.')), aliases[0]))
          ")
          fi
          LIVE_URL="https://${DOMAIN}"
          echo "Smoke testing ${LIVE_URL} (paths: ${SMOKE_PATHS}) ..."
          FAIL=0
          for path in $SMOKE_PATHS; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 --connect-timeout 5 \
              --location "${LIVE_URL}${path}" || echo "000")
            if [[ "$STATUS" =~ ^[23] ]]; then
              echo "  ok   ${path} → ${STATUS}"
            else
              echo "  FAIL ${path} → ${STATUS}"
              FAIL=1
            fi
          done
          if [[ "$FAIL" -eq 1 ]]; then
            echo "Smoke test failed — the live site returned an unexpected status after promotion." >&2
            exit 1
          fi

      - name: Invalidate CloudFront cache
        env:
          CF_DISTRIBUTION_ID: ${{ secrets.CF_DISTRIBUTION_ID }}
          CF_PATHS:           ${{ matrix.deployment.cloudfront_paths }}
        run: |
          # CF_PATHS is space-joined; pass unquoted so each path is a separate argument
          # shellcheck disable=SC2086
          aws cloudfront create-invalidation \
            --distribution-id "$CF_DISTRIBUTION_ID" \
            --paths $CF_PATHS
