name: Deploy

on:
  repository_dispatch:
    types: [website-deploy-request]
  workflow_dispatch:
    inputs:
      website_name:
        description: 'Website name (must match a file in websites-inventory/)'
        required: true
      deployment_name:
        description: 'Deployment to run (empty = all deployments)'
        required: false
        default: ''
      website_sha:
        description: 'Website repo SHA (leave empty for HEAD of main)'
        required: false
        default: ''
      data_sha:
        description: 'Data repo SHA (leave empty for HEAD of main)'
        required: false
        default: ''

# Never cancel a running deploy mid-flight. Queue the next one instead.
concurrency:
  group: deploy-${{ inputs.website_name || github.event.client_payload.website_name }}-${{ inputs.deployment_name || github.event.client_payload.deployment_name || 'all' }}
  cancel-in-progress: false



permissions:
  contents: read

jobs:
  # ── config ────────────────────────────────────────────────────────────────
  # Reads <website_name>.yaml from websites-inventory and resolves the list of
  # deployments to build. Downstream jobs fan out over deployments_json as a matrix.
  config:
    name: Resolve Config
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
    outputs:
      website_name:     ${{ steps.name.outputs.website_name }}
      should_deploy:    ${{ steps.parse.outputs.should_deploy }}
      deployments_json: ${{ steps.parse.outputs.deployments_json }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Resolve website name
        id: name
        run: |
          NAME="${{ inputs.website_name || github.event.client_payload.website_name }}"
          if [[ -z "$NAME" ]]; then
            echo "website_name is required (pass as input or client_payload.website_name)" >&2
            exit 1
          fi
          echo "website_name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Checkout websites-inventory
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ vars.INVENTORY_REPO || format('{0}/websites-inventory', github.repository_owner) }}
          token: ${{ secrets.CI_REPO_READ_TOKEN }}

      - name: Parse inventory and resolve deployments
        id: parse
        env:
          WEBSITE_NAME:      ${{ steps.name.outputs.website_name }}
          DEPLOYMENT_NAME:   ${{ inputs.deployment_name || github.event.client_payload.deployment_name || '' }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          python3 - <<'PYEOF'
          import yaml, os, sys, json

          name              = os.environ["WEBSITE_NAME"]
          deployment_filter = os.environ.get("DEPLOYMENT_NAME", "").strip()
          event             = os.environ["GITHUB_EVENT_NAME"]

          path = f"{name}.yaml"
          if not os.path.exists(path):
              print(f"Inventory file not found: {path}", file=sys.stderr)
              sys.exit(1)
          with open(path) as f:
              cfg = yaml.safe_load(f)

          top_sources  = cfg.get("sources", {})
          top_website  = top_sources.get("website", {})
          top_data     = top_sources.get("data",    {})
          top_compiler = cfg.get("compiler", {})
          top_builds   = cfg.get("builds",  {})
          top_publish  = cfg.get("publish", {})
          top_mode     = cfg.get("deploy_mode", "manual")
          top_env      = cfg.get("github_environment", "prod")
          top_cf       = top_publish.get("cloudfront_invalidate_paths", ["/*"])

          raw_deployments = cfg.get("deployments", None)
          legacy = raw_deployments is None

          def resolve(dep_name, dep_cfg):
              d_src = dep_cfg.get("sources", {})
              d_web = d_src.get("website", {})
              d_dat = d_src.get("data",    {})
              d_pub = dep_cfg.get("publish", {})
              d_cf  = d_pub.get("cloudfront_invalidate_paths", top_cf)
              return {
                  "name":             dep_name,
                  "deploy_mode":      dep_cfg.get("deploy_mode", top_mode),
                  "website_repo":     top_website.get("repo", ""),
                  "website_ref":      d_web.get("ref", top_website.get("ref", "main")),
                  "data_repo":        top_data.get("repo", ""),
                  "data_ref":         d_dat.get("ref", top_data.get("ref", "main")),
                  "data_subpath":     d_dat.get("subpath", top_data.get("subpath", "")),
                  "compiler_repo":    top_compiler.get("repo", ""),
                  "compiler_ref":     top_compiler.get("ref", "main"),
                  "builds_bucket":    top_builds.get("bucket", ""),
                  "builds_region":    top_builds.get("region", "us-east-1"),
                  "publish_bucket":   d_pub.get("bucket", top_publish.get("bucket", "")),
                  "publish_prefix":   d_pub.get("prefix", ""),
                  "publish_region":   d_pub.get("region", top_publish.get("region", top_builds.get("region", "us-east-1"))),
                  "cloudfront_paths": " ".join(d_cf),
                  "github_env":       dep_cfg.get("github_environment", top_env),
                  "staging_prefix":   f"{name}/{dep_name}" if not legacy else name,
              }

          if not legacy:
              all_deps = [resolve(k, v) for k, v in raw_deployments.items()]
          else:
              all_deps = [resolve("production", {})]

          if deployment_filter:
              selected = [d for d in all_deps if d["name"] == deployment_filter]
              if not selected:
                  avail = [d["name"] for d in all_deps]
                  print(f"deployment '{deployment_filter}' not found in {name}.yaml; available: {avail}", file=sys.stderr)
                  sys.exit(1)
          elif event == "workflow_dispatch":
              selected = all_deps
          else:
              selected = [d for d in all_deps if d["deploy_mode"] == "auto"]

          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a") as f:
              delim = "DEPLOYMENTS_JSON_EOF"
              f.write(f"should_deploy={'true' if selected else 'false'}\n")
              f.write(f"deployments_json<<{delim}\n")
              f.write(json.dumps(selected))
              f.write(f"\n{delim}\n")
          PYEOF

  # ── validate ──────────────────────────────────────────────────────────────
  validate:
    name: Validate Data (${{ matrix.deployment.name }})
    needs: config
    if: needs.config.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: prod
    strategy:
      fail-fast: false
      matrix:
        deployment: ${{ fromJson(needs.config.outputs.deployments_json) }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout data repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ matrix.deployment.data_repo }}
          ref: ${{ github.event.client_payload.data_sha || inputs.data_sha || matrix.deployment.data_ref }}
          path: checkout/data
          token: ${{ secrets.CI_REPO_READ_TOKEN }}

      - name: Checkout website repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ matrix.deployment.website_repo }}
          ref: ${{ inputs.website_sha || matrix.deployment.website_ref }}
          path: checkout/website
          token: ${{ secrets.CI_REPO_READ_TOKEN }}

      - name: Checkout compiler
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ matrix.deployment.compiler_repo }}
          ref: ${{ matrix.deployment.compiler_ref }}
          path: checkout/compiler
          token: ${{ secrets.CI_REPO_READ_TOKEN }}

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: checkout/compiler/go.mod
          cache: true

      - name: Detect compiler layout
        id: compiler
        shell: bash
        run: |
          set -euo pipefail
          for root in checkout/compiler checkout/compiler/*/; do
            if [[ -f "${root}/go.mod" && -f "${root}/cmd/website-compiler/main.go" ]]; then
              echo "dir=${root}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "Could not detect compiler layout under checkout/compiler" >&2; exit 1

      - name: Inject data into website
        run: |
          set -euo pipefail
          SUBPATH="${{ matrix.deployment.data_subpath }}"
          DATA_ROOT="checkout/data${SUBPATH:+/${SUBPATH%/}}"
          mkdir -p checkout/website/src/data/site.d
          if [ -d "checkout/data/shared/site.d" ]; then
            cp -r checkout/data/shared/site.d/. checkout/website/src/data/site.d/
          fi
          cp -r "${DATA_ROOT}/site.d/." checkout/website/src/data/site.d/
          cp "${DATA_ROOT}/site.yaml"   checkout/website/src/data/

      - name: Validate site data against contract
        run: |
          set -euo pipefail
          go -C "${{ steps.compiler.outputs.dir }}" run ./cmd/website-compiler \
            validate-site-data \
            -website-root "$GITHUB_WORKSPACE/checkout/website"

  # ── build ─────────────────────────────────────────────────────────────────
  build:
    name: Build & Upload Artifact (${{ matrix.deployment.name }})
    needs: [config, validate]
    if: needs.config.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: ${{ matrix.deployment.github_env }}
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        deployment: ${{ fromJson(needs.config.outputs.deployments_json) }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout data repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ matrix.deployment.data_repo }}
          ref: ${{ github.event.client_payload.data_sha || inputs.data_sha || matrix.deployment.data_ref }}
          path: checkout/data
          token: ${{ secrets.CI_REPO_READ_TOKEN }}

      - name: Checkout website repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ matrix.deployment.website_repo }}
          ref: ${{ inputs.website_sha || matrix.deployment.website_ref }}
          path: checkout/website
          token: ${{ secrets.CI_REPO_READ_TOKEN }}

      - name: Checkout compiler
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ matrix.deployment.compiler_repo }}
          ref: ${{ matrix.deployment.compiler_ref }}
          path: checkout/compiler
          token: ${{ secrets.CI_REPO_READ_TOKEN }}

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: checkout/compiler/go.mod
          cache: true

      - name: Detect compiler layout
        id: compiler
        shell: bash
        run: |
          set -euo pipefail
          for root in checkout/compiler checkout/compiler/*/; do
            if [[ -f "${root}/go.mod" && -f "${root}/cmd/website-compiler/main.go" ]]; then
              echo "dir=${root}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "Could not detect compiler layout under checkout/compiler" >&2; exit 1

      - name: Inject data into website
        run: |
          set -euo pipefail
          SUBPATH="${{ matrix.deployment.data_subpath }}"
          DATA_ROOT="checkout/data${SUBPATH:+/${SUBPATH%/}}"
          mkdir -p checkout/website/src/data/site.d
          if [ -d "checkout/data/shared/site.d" ]; then
            cp -r checkout/data/shared/site.d/. checkout/website/src/data/site.d/
          fi
          cp -r "${DATA_ROOT}/site.d/." checkout/website/src/data/site.d/
          cp "${DATA_ROOT}/site.yaml"   checkout/website/src/data/

      - name: Build static site
        run: |
          set -euo pipefail
          mkdir -p dist
          go -C "${{ steps.compiler.outputs.dir }}" run ./cmd/build-static \
            -website-root "$GITHUB_WORKSPACE/checkout/website" \
            -out "$GITHUB_WORKSPACE/dist" \
            -clean-urls

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ matrix.deployment.builds_region }}

      - name: Upload build artifact to staging bucket
        env:
          STAGING_PREFIX: ${{ matrix.deployment.staging_prefix }}
          BUILD_SHA:      ${{ github.event.client_payload.sha || github.sha }}
          BUILDS_BUCKET:  ${{ matrix.deployment.builds_bucket }}
          REGION:         ${{ matrix.deployment.builds_region }}
        run: |
          set -euo pipefail
          SHA7="${BUILD_SHA::7}"
          aws s3 sync dist/ "s3://${BUILDS_BUCKET}/${STAGING_PREFIX}/${SHA7}/" \
            --region "$REGION" --delete

  # ── promote ───────────────────────────────────────────────────────────────
  promote:
    name: Promote to Live (${{ matrix.deployment.name }})
    needs: [config, build]
    if: needs.config.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: ${{ matrix.deployment.github_env }}
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        deployment: ${{ fromJson(needs.config.outputs.deployments_json) }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ matrix.deployment.builds_region }}

      - name: Promote build to live bucket
        env:
          STAGING_PREFIX: ${{ matrix.deployment.staging_prefix }}
          BUILD_SHA:      ${{ github.event.client_payload.sha || github.sha }}
          BUILDS_BUCKET:  ${{ matrix.deployment.builds_bucket }}
          LIVE_BUCKET:    ${{ secrets.S3_WEBSITE_BUCKET }}
          PUBLISH_PREFIX: ${{ matrix.deployment.publish_prefix }}
          REGION:         ${{ matrix.deployment.builds_region }}
        run: |
          set -euo pipefail
          SHA7="${BUILD_SHA::7}"
          SRC="s3://${BUILDS_BUCKET}/${STAGING_PREFIX}/${SHA7}/"
          if [[ -n "${PUBLISH_PREFIX}" ]]; then
            DEST="s3://${LIVE_BUCKET}/${PUBLISH_PREFIX%/}/"
          else
            DEST="s3://${LIVE_BUCKET}/"
          fi
          aws s3 sync "$SRC" "$DEST" --region "$REGION" --delete

      - name: Invalidate CloudFront cache
        env:
          CF_DISTRIBUTION_ID: ${{ secrets.CF_DISTRIBUTION_ID }}
          CF_PATHS:           ${{ matrix.deployment.cloudfront_paths }}
        run: |
          # CF_PATHS is space-joined; pass unquoted so each path is a separate argument
          # shellcheck disable=SC2086
          aws cloudfront create-invalidation \
            --distribution-id "$CF_DISTRIBUTION_ID" \
            --paths $CF_PATHS
