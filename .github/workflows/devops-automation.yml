name: DevOps / Automation

on:
  schedule:
    - cron: "0 3 * * 0" # Sundays 03:00 UTC
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scorecard:
    timeout-minutes: 15
    if: vars.SCORECARD_ENABLED == 'true' && github.event_name != 'pull_request'
    permissions:
      contents: read
      actions: read
      security-events: write
      id-token: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-scorecard.yml@main
    with:
      upload-sarif: true

  stale:
    timeout-minutes: 15
    if: vars.STALE_ENABLED == 'true' && github.event_name != 'pull_request'
    permissions:
      contents: read
      issues: write
      pull-requests: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-stale.yml@main
    with:
      only: "both"

  release-please:
    timeout-minutes: 30
    if: vars.RELEASE_PLEASE_ENABLED == 'true' && github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-release-please.yml@main
    with:
      target-branch: "main"
    secrets:
      RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}

