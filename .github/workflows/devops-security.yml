name: DevOps / Security

permissions: {}

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main, master]
  schedule:
    - cron: "37 22 27 * *"  # monthly scattered (was: 0 6 * * 1)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    # Skip heavy vuln scanners (trivy/grype/osv) on docs-only changes.
    # gitleaks still runs on everything — secrets can hide in markdown too.
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '!**/*.md'
              - '!docs/**'

  security-fs:
    needs: changes
    if: |
      always() && (
        needs.changes.result == 'skipped' ||
        needs.changes.outputs.code == 'true'
      )
    permissions:
      contents: read
      actions: read
      security-events: write
    # Consolidated fs-security bundle: Trivy(fs) + Grype(fs) + gitleaks in ONE job
    # (was 3 separate jobs). upload-sarif off: GHAS/code-scanning not enabled.
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-security-fs.yml@503674eb96658628d0938c23a44d226803021705 # v1.3.0
    with:
      working-directory: "."
      scan-history: true
      upload-sarif: false
  codeql:
    if: ${{ github.event_name != 'pull_request' }}
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@main
    with:
      languages: "actions"
      source-root: "."

  osv:
    needs: changes
    if: |
      always() && (
        needs.changes.result == 'skipped' ||
        needs.changes.outputs.code == 'true'
      )
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-osv-scanner.yml@main
    with:
      working-directory: "."
      upload-sarif: false
