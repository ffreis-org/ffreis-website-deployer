    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    timeout-minutes: 30
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-release-please.yml@main
