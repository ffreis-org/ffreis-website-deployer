name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "34 23 * * 0"

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@57c46cfaf3b815c97c58983ae2be73fb85573fb6
    with:
      languages: "actions"
