name: CodeQL

on:
  schedule:
    - cron: "31 0 12 * *"  # monthly scattered (was: 34 23 * * 0)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@0aa2f6932831848d438834938acefcd98bc05c42 # post-v1.6.0
    with:
      languages: "actions"
