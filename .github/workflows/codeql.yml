name: CodeQL

permissions: {}

on:
  schedule:
    - cron: "31 0 12 * *"  # monthly scattered (was: 34 23 * * 0)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@3858e9e74c805067e454740b195372c7195f333b # v1.5.0
    with:
      languages: "actions"
