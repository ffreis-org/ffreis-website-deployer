name: CodeQL

on:
  schedule:
    - cron: "31 0 12 * *"  # monthly scattered (was: 34 23 * * 0)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@ce7169b36bd25b1c4c0c8077aa78ecde6d6ca7d5 # v1.6.0
    with:
      languages: "actions"
