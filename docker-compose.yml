services:
  publisher:
    image: ${PUBLISH_IMAGE:-docker.io/library/golang:1.25.8}
    container_name: website-publisher
    working_dir: /workspace
    environment:
      - AWS_REGION
      - AWS_DEFAULT_REGION
      - AWS_PROFILE
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN
      - AWS_ROLE_ARN
      - AWS_WEB_IDENTITY_TOKEN_FILE
      - AWS_SDK_LOAD_CONFIG
      - PUBLISH_BUCKET
      - PUBLISH_PREFIX
      - PUBLISH_DIR
      - PUBLISH_NO_DELETE
      - PUBLISH_REGION
      - PUBLISH_DRY_RUN
    volumes:
      - ${WORKSPACE_ROOT:-.}:/workspace
      - ${HOME}/.aws:/root/.aws:ro
    command: ["bash", "-lc", "${PUBLISH_SCRIPT:?set PUBLISH_SCRIPT to the path of publish.sh relative to WORKSPACE_ROOT}"]

  invalidator:
    image: ${AWS_CLI_IMAGE:-docker.io/amazon/aws-cli:2.15.0}
    container_name: website-cloudfront-invalidator
    working_dir: /workspace
    environment:
      - AWS_REGION
      - AWS_DEFAULT_REGION
      - AWS_PROFILE
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN
      - AWS_ROLE_ARN
      - AWS_WEB_IDENTITY_TOKEN_FILE
      - CLOUDFRONT_DISTRIBUTION_ID
      - CLOUDFRONT_PATHS
    volumes:
      - ${WORKSPACE_ROOT:-.}:/workspace
      - ${HOME}/.aws:/root/.aws:ro
    command: ["bash", "-lc", "${INVALIDATE_SCRIPT:?set INVALIDATE_SCRIPT to the path of cloudfront-invalidate.sh relative to WORKSPACE_ROOT}"]
